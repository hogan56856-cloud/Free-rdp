name: RDP-Germany-Fixed

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Update Package List & Install Desktop Environment
        run: |
          sudo apt-get update
          # تثبيت الواجهة الرسومية وخادم الـ RDP وحزم التشغيل الأساسية
          sudo apt-get install -y xfce4 xfce4-goodies xrdp dbus-x11

      - name: Configure Global XRDP Settings
        run: |
          sudo systemctl enable xrdp
          # إعداد نظام الألوان والـ Polkit لمنع رسائل طلب الباسورد الداخلية
          sudo sed -i 's/allowed_users=console/allowed_users=anybody/g' /etc/xrdp/Xwrapper.config
          sudo systemctl restart xrdp

      - name: Configure Core Firewall Settings
        run: |
          sudo ufw allow 3389/tcp

      - name: Create RDP User and Fix XFCE Session
        id: create_user
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=')
          sudo useradd -m -s /bin/bash RDP
          echo "RDP:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo RDP
          
          # الحــــــــل السحري: كتابة ملف الجلسة مباشرة داخل فولدر المستخدم RDP وتمليكه له
          echo "xfce4-session" | sudo tee /home/RDP/.xsession
          echo "startxfce4" | sudo tee /home/RDP/.Xclients
          sudo chown -R RDP:RDP /home/RDP/
          
          echo "RDP_CREDS=User: RDP | Password: $PASSWORD" >> $GITHUB_ENV
          echo "User: RDP | Password: $PASSWORD"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$GITHUB_RUN_ID --accept-routes --accept-dns
          TS_IP=""
          retries=0
          while [ -z "$TS_IP" ] && [ $retries -lt 20 ]; do
              TS_IP=$(tailscale ip -4)
              sleep 5
              retries=$((retries+1))
          done
          if [ -z "$TS_IP" ]; then
              echo "Tailscale IP not assigned. Exiting."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Verify Geographic Location is Germany/Europe
        run: |
          LOCATION_INFO=$(curl -s "https://ipinfo.io/json")
          IP=$(echo "$LOCATION_INFO" | grep -oP '"ip": "\K[^"]+')
          COUNTRY=$(echo "$LOCATION_INFO" | grep -oP '"country": "\K[^"]+')
          REGION=$(echo "$LOCATION_INFO" | grep -oP '"region": "\K[^"]+')
          CITY=$(echo "$LOCATION_INFO" | grep -oP '"city": "\K[^"]+')
          
          echo "Current Server IP: $IP"
          echo "Current Country: $COUNTRY"
          echo "Current Region/City: $REGION - $CITY"

      - name: Verify RDP Accessibility
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"
          nc -z -v -w5 $TAILSCALE_IP 3389

      - name: Maintain Connection
        run: |
          echo -e "\n=== RDP ACCESS ==="
          echo "Address: $TAILSCALE_IP"
          echo "$RDP_CREDS"
          echo -e "==================\n"
          while true; do
              echo "[$(date)] RDP Active - Use Ctrl+C in workflow to terminate"
              sleep 300
          done
