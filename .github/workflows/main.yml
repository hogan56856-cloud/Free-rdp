name: Windows RDP

on:
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install and Setup Tailscale
        shell: powershell
        run: |
          Write-Host "Downloading Tailscale..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Write-Host "Installing Tailscale..."
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          Start-Sleep -Seconds 10
          Write-Host "Connecting to Tailscale..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-win-${{ github.run_id }} --unattended
          $TS_IP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$TS_IP" >> $env:GITHUB_ENV

      - name: Set Password and Enable RDP
        shell: powershell
        run: |
          $Password = "Windows@2026"
          net user runneradmin $Password
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 🔑 Print Credentials (CLICK HERE)
        shell: powershell
        run: |
          Write-Output "=========================================="
          Write-Output "✅ SERVER IS READY!"
          Write-Output "🌐 Address: ${{ env.TAILSCALE_IP }}"
          Write-Output "👤 Username: runneradmin"
          Write-Output "🔑 Password: Windows@2026"
          Write-Output "=========================================="
          Write-Output "استخدم تطبيق RD Client للاتصال"

      - name: ⏳ Server is Running (DO NOT CLICK)
        shell: powershell
        run: |
          Write-Output "السيرفر شغال دلوقتي..."
          while ($true) { Start-Sleep -Seconds 300 }
