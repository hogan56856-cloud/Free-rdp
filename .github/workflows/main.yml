name: macOS VNC

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Create Mac User with Secure Password
        run: |
          # توليد باسورد عشوائية
          PASSWORD=$(openssl rand -base64 6 | cut -c1-8)
          sudo sysadminctl -addUser macuser -fullName "Mac VNC User" -password "$PASSWORD" -admin
          
          # حفظ الباسورد في متغيرات البيئة عشان الخطوات الجاية
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Enable Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -users macuser -privs -all -restart -agent
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$MAC_PASSWORD" -restart -agent

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled > /dev/null 2>&1 &
          sleep 5

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-${GITHUB_RUN_ID} --accept-routes --accept-dns
          TS_IP=$(tailscale ip -4)
          if [ -z "$TS_IP" ]; then
              echo "Tailscale IP not assigned. Exiting."
              exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: 🔑 Print Credentials (CLICK HERE)
        run: |
          echo "=========================================="
          echo "✅ SERVER IS READY!"
          echo "🌐 Address: $TAILSCALE_IP:5900"
          echo "👤 Username: macuser"
          echo "🔑 Password: $MAC_PASSWORD"
          echo "=========================================="
          echo "انسخ العنوان والباسورد واستخدمهم في تطبيق VNC Viewer"

      - name: ⏳ Server is Running (DO NOT CLICK)
        run: |
          echo "السيرفر شغال دلوقتي... مش محتاج تفتح الخطوة دي."
          while true; do
              sleep 300
          done
