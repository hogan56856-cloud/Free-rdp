name: Windows RDP

on:
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Set up Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: gh-win-${{ github.run_id }}

      - name: Set Password and Enable RDP
        shell: powershell
        run: |
          $Password = "Windows@2026"
          net user runneradmin $Password
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 🔑 Print Credentials (CLICK HERE)
        shell: powershell
        run: |
          $TS_IP = (tailscale ip -4).Trim()
          Write-Output "=========================================="
          Write-Output "✅ SERVER IS READY!"
          Write-Output "🌐 Address: $TS_IP"
          Write-Output "👤 Username: runneradmin"
          Write-Output "🔑 Password: Windows@2026"
          Write-Output "=========================================="

      - name: ⏳ Server is Running (DO NOT CLICK)
        shell: powershell
        run: |
          Write-Output "السيرفر شغال دلوقتي..."
          while ($true) { Start-Sleep -Seconds 300 }

      - name: 🔑 Print Credentials (CLICK HERE)
        run: |
          echo "=========================================="
          echo "✅ SERVER IS READY!"
          echo "🌐 Address: $TAILSCALE_IP:5900"
          echo "👤 Username: runner"
          echo "🔑 Password: $MAC_PASSWORD"
          echo "=========================================="
          echo "انسخ العنوان والباسورد واستخدمهم في تطبيق VNC Viewer"

      - name: ⏳ Server is Running (DO NOT CLICK)
        run: |
          echo "السيرفر شغال دلوقتي..."
          while true; do
              sleep 300
          done
